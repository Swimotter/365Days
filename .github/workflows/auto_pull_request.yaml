name: Auto Pull Request
on:
  push:
    branches:
      - autopr

permissions:
  contents: write
  pull-requests: write

jobs:
  create_pull_request:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Create Pull Request
        run: |
          gh pr create \
            --base main \
            --title "Auto PR: $(date +'%Y-%m-%d %H:%M')" \
            --assignee swimotter \
            --body-file .github/pull_request_template.md \
            --draft \
            --milestone "1.0"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
