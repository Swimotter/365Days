name: Auto Pull Request
on:
  push:
    branches:
      - "issue/**"

permissions:
  contents: write
  pull-requests: write

jobs:
  create_pull_request:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Extract issue number
        id: issue
        run: |
          BRANCH="${GITHUB_REF#refs/heads/}"
          ISSUE_NUMBER=$(echo "$BRANCH" | grep -oE '[0-9]+' | head -1)
          echo "issue_number=$ISSUE_NUMBER" >> $GITHUB_OUTPUT

      - name: Build PR body
        run: |
          BODY_FILE=$(mktemp)
          cp .github/pull_request_template.md "$BODY_FILE"

          if [ -n "${{ steps.issue.outputs.issue_number }}" ]; then
            sed -i "s/- Closes #/- Closes #${{ steps.issue.outputs.issue_number }}/" "$BODY_FILE"
          fi

          echo "BODY_FILE=$BODY_FILE" >> $GITHUB_ENV

      - name: Create or Update Pull Request
        run: |
          BRANCH="${GITHUB_REF#refs/heads/}"
          PR_TITLE=$(git log -1 --pretty=%s)

          PR_NUMBER=$(gh pr list \
            --head "$BRANCH" \
            --base main \
            --json number \
            --jq '.[0].number')

          if [ -z "$PR_NUMBER" ]; then
            gh pr create \
              --base main \
              --head "$BRANCH" \
              --title "$PR_TITLE" \
              --body-file "$BODY_FILE" \
              --draft
          else
            gh pr edit "$PR_NUMBER" \
              --body-file "$BODY_FILE" \
              --title "$PR_TITLE"
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
